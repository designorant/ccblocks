name: Publish
run-name: Publish

on:
  workflow_run:
    workflows: ["Test"]
    branches: [master]
    types:
      - completed

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
      version_changed: ${{ steps.check_version_changed.outputs.changed }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Check if VERSION file changed
        id: check_version_changed
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"

          # Check if this is the first commit (no parent)
          if ! git rev-parse "${SHA}~1" >/dev/null 2>&1; then
            echo "First commit detected - checking if VERSION exists"
            if git ls-tree -r "${SHA}" --name-only | grep -q "^VERSION$"; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "VERSION file exists in first commit"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "VERSION file not in first commit, skipping release"
            fi
          else
            # Normal case: compare with parent commit
            if git diff --name-only "${SHA}~1" "${SHA}" | grep -q "^VERSION$"; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "VERSION file changed"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "VERSION file not changed, skipping release"
            fi
          fi

      - name: Get version from VERSION file
        if: steps.check_version_changed.outputs.changed == 'true'
        id: get_version
        run: |
          VERSION=$(tr -d '\n\r' < VERSION)
          VERSION_REGEX='^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?([+][0-9A-Za-z][0-9A-Za-z.-]*)?$'

          if [[ ! "$VERSION" =~ $VERSION_REGEX ]]; then
            echo "Version must match SemVer, for example 1.2.3 or 1.2.3-beta.1" >&2
            exit 1
          fi

          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if tag already exists
        if: steps.check_version_changed.outputs.changed == 'true'
        id: check_tag
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${VERSION} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${VERSION} does not exist"
          fi

  release:
    name: Publish
    needs: validate
    if: needs.validate.outputs.version_changed == 'true' && needs.validate.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Generate changelog
        id: changelog
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # Get commits since last tag (or all if no previous tag)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
            echo "## Changes since ${LAST_TAG}" > changelog.md
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
            echo "## Initial Release" > changelog.md
          fi

          echo "" >> changelog.md
          echo "$COMMITS" >> changelog.md
          echo "" >> changelog.md
          echo "**Full Changelog**: https://github.com/${REPOSITORY}/commits/v${VERSION}" >> changelog.md

          cat changelog.md

      - name: Create and push tag
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create tag only if it doesn't exist
          if ! git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
            echo "Tag v${VERSION} created and pushed"
          else
            echo "Tag v${VERSION} already exists, skipping"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Homebrew tap
        uses: dawidd6/action-homebrew-bump-formula@1446dca236b0440c6f02723a3f14f13be2c04ab0 # v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula: ccblocks
          tap: designorant/homebrew-tap
          tag: v${{ needs.validate.outputs.version }}

      - name: Auto-merge Homebrew tap PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          # Wait for PR to be created
          sleep 5

          # Find and merge the bump PR
          PR_NUMBER=$(gh pr list \
            --repo designorant/homebrew-tap \
            --head "bump-ccblocks-${VERSION}" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" \
              --repo designorant/homebrew-tap \
              --squash \
              --subject "chore: bump ccblocks to ${VERSION}" \
              --body ""
            echo "✓ Merged PR #$PR_NUMBER"
          else
            echo "⚠ No PR found for bump-ccblocks-${VERSION}"
            exit 1
          fi
